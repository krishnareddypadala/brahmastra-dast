<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Brahmastra DAST">
  <title>Brahmastra DAST</title>
  <!--
    Header-scale icon (optimized to read at 24-48 px).
    Transparent background on purpose — the host header supplies the surface.
    Composition:
      • Gold "bowstring" ring (Brahma's bow)
      • Glowing cyan diagonal arrow (the astra) passing through the ring
      • White-hot chakra core at the center (Sudarshana discus)
  -->
  <defs>
    <linearGradient id="bm-arrow" x1="12" y1="52" x2="52" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="bm-chakra" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#dbeafe" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="bm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer gold bowstring ring -->
  <circle cx="32" cy="32" r="26"
          fill="none" stroke="#fbbf24" stroke-width="2.4"
          filter="url(#bm-glow)"/>

  <!-- Inner thin gold ring for depth -->
  <circle cx="32" cy="32" r="22"
          fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.55"/>

  <!-- Chakra halo -->
  <circle cx="32" cy="32" r="9" fill="url(#bm-chakra)"/>

  <!-- Brahmastra arrow: lower-left → upper-right -->
  <g filter="url(#bm-glow)">
    <!-- Shaft -->
    <line x1="12" y1="52" x2="52" y2="12"
          stroke="url(#bm-arrow)" stroke-width="3.4" stroke-linecap="round"/>

    <!-- Arrowhead (upper-right tip) -->
    <path d="M 52 12 L 44 14 L 50 20 Z"
          fill="#bfdbfe" stroke="#ffffff" stroke-width="0.8" stroke-linejoin="round"/>

    <!-- Tail fletching (lower-left) -->
    <g stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" fill="none">
      <line x1="12" y1="52" x2="8"  y2="56"/>
      <line x1="15" y1="55" x2="11" y2="59"/>
      <line x1="9"  y1="49" x2="5"  y2="53"/>
    </g>
  </g>

  <!-- Bright chakra core on top of the arrow -->
  <circle cx="32" cy="32" r="3.2" fill="#ffffff" filter="url(#bm-glow)"/>
  <circle cx="32" cy="32" r="1.4" fill="#ffffff"/>
</svg>
